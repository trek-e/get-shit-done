name: Stale PR & Issue Cleanup

on:
  schedule:
    - cron: '0 9 * * 1'  # Weekly on Monday at 9am UTC
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/stale@v9
        with:
          # PRs
          days-before-pr-stale: 21
          days-before-pr-close: 7
          stale-pr-message: |
            This PR has been inactive for 21 days. It will be closed in 7 days unless updated.

            If the changes are still relevant, please rebase against `main` and push an update.
            The codebase evolves quickly — PRs that fall behind main tend to accumulate conflicts.

            **Node requirement:** 20+ (recommended: 24)
          close-pr-message: |
            Closing due to inactivity. Feel free to reopen or submit a fresh PR against the latest `main` branch.
          stale-pr-label: stale
          exempt-pr-labels: 'do-not-close,work-in-progress'

          # Issues
          days-before-issue-stale: 30
          days-before-issue-close: 14
          stale-issue-message: |
            This issue has been inactive for 30 days. It will be closed in 14 days unless there's new activity.

            If this is still relevant, please comment with an update.
          close-issue-message: |
            Closing due to inactivity. Feel free to reopen if the issue persists.
          stale-issue-label: stale
          exempt-issue-labels: 'do-not-close,priority: critical,priority: high,status: in-progress'

          # Limits
          operations-per-run: 50
